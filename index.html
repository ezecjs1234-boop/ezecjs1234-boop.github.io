<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Frontera</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6976933477402196" crossorigin="anonymous"></script>

    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        .calc-container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 85%;
            max-width: 350px;
        }
        h2 { color: #007bff; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%;
            font-size: 16px;
        }
        button:hover { background: #0056b3; }
        #resultado { 
            margin-top: 20px; 
            font-size: 1.2rem; 
            color: #333; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calc-container">
        <h2>Calculadora de Moneda</h2>
        <input type="number" id="monto" placeholder="Monto en pesos">
        <button onclick="calcular()">Calcular</button>
        <div id="resultado"></div>
    </div>

    <script>
        function calcular() {
            let monto = document.getElementById('monto').value;
            if (monto > 0) {
                // Aquí podés cambiar el 1.25 por el número que vos uses para tu cuenta
                let res = monto * 1.25; 
                document.getElementById('resultado').innerText = "Resultado: $" + res.toLocaleString();
            } else {
                alert("Ingresá un monto primero");
            }
        }
    </script>
</body>
</html>

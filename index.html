<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓLAR CAMBIO PY - Posadas/Encarnación</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6976933477402196" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        h1 { color: #003399; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 20px; }
        
        .card { border-radius: 12px; padding: 15px; margin-bottom: 15px; font-weight: bold; }
        .blue { background-color: #fff9db; color: #333; font-size: 22px; border: 1px solid #ffe066; }
        .proyeccion { background-color: #ebfbee; color: #2f9e44; font-size: 14px; }
        
        .input-group { background-color: #e7f5ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        label { display: block; color: #495057; font-size: 14px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input { width: 90%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 18px; text-align: center; }
        
        .wpp-btn { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>DÓLAR CAMBIO PY</h1>
    <div class="subtitle">Posadas - Encarnación</div>

    <div class="card blue">
        Dólar Blue: $1430
    </div>

    <div class="card proyeccion">
        📈 Proyectado (30 días): $1480
    </div>

    <div class="input-group">
        <label>Cambio Calle (Ej: 4.4)</label>
        <input type="number" id="calle" value="4.4" oninput="convertir()">
    </div>

    <label>Pesos (ARS)</label>
    <input type="number" id="pesos" placeholder="0" oninput="convertirPesos()">

    <br><br>

    <label>Guaraníes (PYG)</label>
    <input type="number" id="guaranies" placeholder="0" oninput="convertirGuarani()">
</div>

<a href="https://wa.me/3764757019" class="wpp-btn">WPP</a>

<script>
    function convertirPesos() {
        let calle = document.getElementById('calle').value;
        let pesos = document.getElementById('pesos').value;
        if(pesos > 0) {
            document.getElementById('guaranies').value = Math.round(pesos * calle);
        }
    }

    function convertirGuarani() {
        let calle = document.getElementById('calle').value;
        let guarani = document.getElementById('guaranies').value;
        if(guarani > 0) {
            document.getElementById('pesos').value = Math.round(guarani / calle);
        }
    }
    
    function convertir() {
        convertirPesos();
    }
</script>

</body>
</html>
